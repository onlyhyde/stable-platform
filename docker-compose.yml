# ===========================================
# StableNet PoC Platform - Docker Compose
# ===========================================
# Service Ports (external):
#   - 4337: Bundler (ERC-4337)
#   - 4338: Paymaster Proxy (ERC-7677)
#   - 4339: Stealth Server (Rust)
#   - 4340: Order Router
#   - 4341: Subscription Executor
#   - 4342: Bridge Relayer
#   - 4350-4352: Simulators (Bank, PG, OnRamp)
#
# Internal Only (not exposed externally):
#   - PostgreSQL (5432) - data-internal network
#   - Redis (6379) - data-internal network
#
# Network Architecture:
#   - data-internal: PostgreSQL, Redis (isolated)
#   - stablenet: All services (inter-service communication)
#   - Services needing data access join both networks
# ===========================================

x-common-env: &common-env
  CHAIN_ID: ${CHAIN_ID:-8283}
  STABLENET_RPC_URL: ${STABLENET_RPC_URL:-http://host.docker.internal:8545}

# Contract addresses sourced from .env.contracts (generated by: cd packages/contracts && pnpm generate)
# Default values below match chain 8283 (StableNet Local).
# To update: run `pnpm generate` then restart services.
x-contract-addresses: &contract-addresses
  # Core (ERC-4337 / Kernel)
  ENTRY_POINT_ADDRESS: ${ENTRY_POINT_ADDRESS:-0xEf6817fe73741A8F10088f9511c64b666a338A14}
  KERNEL_FACTORY_ADDRESS: ${KERNEL_FACTORY_ADDRESS:-0xbEbb0338503F9E28FFDC84C3548F8454F12Dd1D3}
  KERNEL_IMPLEMENTATION_ADDRESS: ${KERNEL_IMPLEMENTATION_ADDRESS:-0xA61b944dd427A85495B685D93237CB73087E0035}
  FACTORY_STAKER_ADDRESS: ${FACTORY_STAKER_ADDRESS:-0x3a87a468ce42BF490B68acb253d81abf806469D1}
  # Validators
  ECDSA_VALIDATOR_ADDRESS: ${ECDSA_VALIDATOR_ADDRESS:-0xb33DC2d82eAee723ca7687D70209ed9A861b3B46}
  WEBAUTHN_VALIDATOR_ADDRESS: ${WEBAUTHN_VALIDATOR_ADDRESS:-0x169844994bd5b64c3A264C54d6b0863Bb7dF0487}
  MULTI_CHAIN_VALIDATOR_ADDRESS: ${MULTI_CHAIN_VALIDATOR_ADDRESS:-0x71528BEa098183dbf8dbD3Ec6dCC3D56842487e5}
  MULTI_SIG_VALIDATOR_ADDRESS: ${MULTI_SIG_VALIDATOR_ADDRESS:-0x284D8e1D4864BfAB4EA1dfE283F7f849C075bFa5}
  WEIGHTED_ECDSA_VALIDATOR_ADDRESS: ${WEIGHTED_ECDSA_VALIDATOR_ADDRESS:-0x38Fb544BEEe122A2Ea593e7d9c8f019751273287}
  # Executors
  SESSION_KEY_EXECUTOR_ADDRESS: ${SESSION_KEY_EXECUTOR_ADDRESS:-0x621b0872c00F6328BD9001A121AF09DD18B193E0}
  # Hooks
  SPENDING_LIMIT_HOOK_ADDRESS: ${SPENDING_LIMIT_HOOK_ADDRESS:-0x304cb9f3725e8B807C2FE951C8DB7fea4176f1c5}
  # Paymasters
  VERIFYING_PAYMASTER_ADDRESS: ${VERIFYING_PAYMASTER_ADDRESS:-0xFED3fc34Af59A30C5a19ff8Caf260604dDF39Fc0}
  ERC20_PAYMASTER_ADDRESS: ${ERC20_PAYMASTER_ADDRESS:-0xaf420BFE67697a5724235E4676136F264023d099}
  SPONSOR_PAYMASTER_ADDRESS: ${SPONSOR_PAYMASTER_ADDRESS:-0x9DeAdA1cC07E2Ff8237c0517C1c2D2b9192D6580}
  # Privacy (Stealth)
  STEALTH_ANNOUNCER_ADDRESS: ${STEALTH_ANNOUNCER_ADDRESS:-0x7706EEaacD036c8c981147991913419E3fc33Abc}
  STEALTH_REGISTRY_ADDRESS: ${STEALTH_REGISTRY_ADDRESS:-0xfB8B3fcE6fd358b6f13a05a216BDC1dEB46c7CD9}
  # Subscriptions
  SUBSCRIPTION_MANAGER_ADDRESS: ${SUBSCRIPTION_MANAGER_ADDRESS:-0x0000000000000000000000000000000000000000}
  RECURRING_PAYMENT_EXECUTOR_ADDRESS: ${RECURRING_PAYMENT_EXECUTOR_ADDRESS:-0x3157C4a86d07a223E3B46F20633f5486E96B8F3C}
  PERMISSION_MANAGER_ADDRESS: ${PERMISSION_MANAGER_ADDRESS:-0x0000000000000000000000000000000000000000}
  # Tokens
  WKRC_ADDRESS: ${WKRC_ADDRESS:-0x7186e5C27Cb08eAF041005D193268006889083f6}
  USDC_ADDRESS: ${USDC_ADDRESS:-0x085Ee10CC10BE8FB2cE51fEB13E809a0c3f98699}
  # Uniswap V3
  UNISWAP_V3_ROUTER: ${UNISWAP_V3_ROUTER:-0x2f86f04c1D29Ac39752384B34167a42E6d1730F9}
  UNISWAP_V3_QUOTER: ${UNISWAP_V3_QUOTER:-0xa6A7175F663c14bF4Bea75A097dc273aB100E4C8}
  UNISWAP_V3_FACTORY: ${UNISWAP_V3_FACTORY:-0x077Bb7aA6d918D87692c7E07C97ED197240bb8C4}
  # Precompiles (chain 8283)
  NATIVE_COIN_ADAPTER_ADDRESS: ${NATIVE_COIN_ADAPTER_ADDRESS:-0x0000000000000000000000000000000000001000}
  GOV_VALIDATOR_ADDRESS: ${GOV_VALIDATOR_ADDRESS:-0x0000000000000000000000000000000000001001}
  GOV_MASTER_MINTER_ADDRESS: ${GOV_MASTER_MINTER_ADDRESS:-0x0000000000000000000000000000000000001002}
  GOV_MINTER_ADDRESS: ${GOV_MINTER_ADDRESS:-0x0000000000000000000000000000000000001003}
  GOV_COUNCIL_ADDRESS: ${GOV_COUNCIL_ADDRESS:-0x0000000000000000000000000000000000001004}
  BLS_POP_PRECOMPILE_ADDRESS: ${BLS_POP_PRECOMPILE_ADDRESS:-0x0000000000000000000000000000000000B00001}
  NATIVE_COIN_MANAGER_ADDRESS: ${NATIVE_COIN_MANAGER_ADDRESS:-0x0000000000000000000000000000000000B00002}
  ACCOUNT_MANAGER_ADDRESS: ${ACCOUNT_MANAGER_ADDRESS:-0x0000000000000000000000000000000000B00003}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

x-resource-limits-sm: &resource-limits-sm
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: '0.5'

x-resource-limits-md: &resource-limits-md
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '1.0'

services:
  # ===================
  # Infrastructure (Internal Network Only)
  # ===================
  postgres:
    image: postgres:16-alpine
    container_name: stablenet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stablenet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required - copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:-stablenet}
    # SECURITY: PostgreSQL is NOT exposed externally. Access via data-internal network only.
    # For local debugging, uncomment the ports section below:
    # ports:
    #   - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stablenet}"]
      <<: *healthcheck-defaults
    <<: *resource-limits-md
    networks:
      - data-internal

  redis:
    image: redis:7-alpine
    container_name: stablenet-redis
    restart: unless-stopped
    # SECURITY: Redis with password authentication
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-stablenet-redis-dev}
    # SECURITY: Redis is NOT exposed externally. Access via data-internal network only.
    # For local debugging, uncomment the ports section below:
    # ports:
    #   - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-stablenet-redis-dev}", "ping"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - data-internal

  # ===================
  # TypeScript Services
  # ===================
  bundler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.node
      args:
        SERVICE: services/bundler
    container_name: stablenet-bundler
    restart: unless-stopped
    ports:
      - "${BUNDLER_PORT:-4337}:4337"
    environment:
      <<: [*common-env, *contract-addresses]
      PORT: 4337
      # Redis URL with authentication
      REDIS_URL: redis://:${REDIS_PASSWORD:-stablenet-redis-dev}@redis:6379
      BUNDLER_PRIVATE_KEY: ${BUNDLER_PRIVATE_KEY:?required - copy .env.example to .env}
      BUNDLER_BENEFICIARY: ${BUNDLER_BENEFICIARY:-0x90F79bf6EB2c4f870365E785982E1f101E93b906}
      # CORS: comma-separated origins or "*" for all (not recommended in production)
      BUNDLER_CORS_ORIGINS: ${BUNDLER_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    command: >
      node dist/cli/index.js run
      --port 4337
      --rpc-url ${STABLENET_RPC_URL:-http://host.docker.internal:8545}
      --entry-point ${ENTRY_POINT_ADDRESS:-0xEf6817fe73741A8F10088f9511c64b666a338A14}
      --beneficiary ${BUNDLER_BENEFICIARY:-0x90F79bf6EB2c4f870365E785982E1f101E93b906}
      --private-key ${BUNDLER_PRIVATE_KEY}
      --network devnet
      --log-level info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4337/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      <<: *healthcheck-defaults
    <<: *resource-limits-md
    networks:
      - stablenet
      - data-internal

  paymaster-proxy:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.node
      args:
        SERVICE: services/paymaster-proxy
    container_name: stablenet-paymaster-proxy
    restart: unless-stopped
    ports:
      - "${PAYMASTER_PORT:-4338}:4338"
    environment:
      <<: [*common-env, *contract-addresses]
      PORT: 4338
      BUNDLER_URL: http://bundler:4337
      PAYMASTER_SIGNER_PRIVATE_KEY: ${PAYMASTER_SIGNER_PRIVATE_KEY:?required - copy .env.example to .env}
    command: >
      node dist/cli/index.js run
      --port 4338
      --paymaster ${VERIFYING_PAYMASTER_ADDRESS:-0xFED3fc34Af59A30C5a19ff8Caf260604dDF39Fc0}
      --signer ${PAYMASTER_SIGNER_PRIVATE_KEY}
      --rpc ${STABLENET_RPC_URL:-http://host.docker.internal:8545}
      --chain-ids ${CHAIN_ID:-31337}
    depends_on:
      bundler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4338/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet

  # ===================
  # Rust Services
  # ===================
  stealth-server:
    build:
      context: ./services/stealth-server
      dockerfile: Dockerfile
    container_name: stablenet-stealth-server
    restart: unless-stopped
    ports:
      - "${STEALTH_SERVER_PORT:-4339}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      # NOTE: sslmode=disable is acceptable for local Docker network only. Use sslmode=require in production.
      DATABASE_URL: postgres://${POSTGRES_USER:-stablenet}:${POSTGRES_PASSWORD}@postgres:5432/stablenet_stealth?sslmode=disable
      DATABASE_MAX_CONNECTIONS: 10
      CHAIN_ID: ${CHAIN_ID:-31337}
      INDEXER_WS_URL: ${STABLENET_RPC_URL:-ws://host.docker.internal:8545}
      RUST_LOG: stealth_server=info,actix_web=info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-md
    networks:
      - stablenet
      - data-internal

  # ===================
  # Go Services
  # ===================
  order-router:
    build:
      context: ./services/order-router
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: stablenet-order-router
    restart: unless-stopped
    ports:
      - "${ORDER_ROUTER_PORT:-4340}:4340"
    environment:
      <<: [*common-env, *contract-addresses]
      PORT: 4340
      UNISWAP_V3_ROUTER: ${UNISWAP_V3_ROUTER:-0x2f86f04c1D29Ac39752384B34167a42E6d1730F9}
      UNISWAP_V3_QUOTER: ${UNISWAP_V3_QUOTER:-0xa6A7175F663c14bF4Bea75A097dc273aB100E4C8}
      PRICE_CACHE_TTL: 30
      MAX_HOPS: 3
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4340/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet

  subscription-executor:
    build:
      context: ./services/subscription-executor
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: stablenet-subscription-executor
    restart: unless-stopped
    ports:
      - "${SUBSCRIPTION_EXECUTOR_PORT:-4341}:4341"
    environment:
      <<: [*common-env, *contract-addresses]
      PORT: 4341
      # NOTE: sslmode=disable is acceptable for local Docker network only. Use sslmode=require in production.
      DATABASE_URL: postgres://${POSTGRES_USER:-stablenet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stablenet}?sslmode=disable
      DATABASE_USE_INMEMORY: ${DATABASE_USE_INMEMORY:-false}
      # Redis URL with authentication
      REDIS_URL: redis://:${REDIS_PASSWORD:-stablenet-redis-dev}@redis:6379
      BUNDLER_URL: http://bundler:4337
      PAYMASTER_URL: http://paymaster-proxy:4338
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bundler:
        condition: service_healthy
      paymaster-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4341/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-md
    networks:
      - stablenet
      - data-internal

  bridge-relayer:
    build:
      context: ./services/bridge-relayer
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: stablenet-bridge-relayer
    restart: unless-stopped
    ports:
      - "${BRIDGE_RELAYER_PORT:-4342}:4342"
    environment:
      <<: [*common-env, *contract-addresses]
      PORT: 4342
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4342/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet

  # ===================
  # Simulators (Go)
  # ===================
  simulator-bank:
    build:
      context: ./services/bank-simulator
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: stablenet-simulator-bank
    restart: unless-stopped
    ports:
      - "${BANK_SIMULATOR_PORT:-4350}:4350"
    environment:
      PORT: 4350
      # SECURITY: Set unique webhook secrets in production
      WEBHOOK_SECRET: ${BANK_WEBHOOK_SECRET:-bank-webhook-secret-dev}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4350/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet

  simulator-pg:
    build:
      context: ./services/pg-simulator
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: stablenet-simulator-pg
    restart: unless-stopped
    ports:
      - "${PG_SIMULATOR_PORT:-4351}:4351"
    environment:
      PORT: 4351
      # SECURITY: Set unique webhook secrets in production
      WEBHOOK_SECRET: ${PG_WEBHOOK_SECRET:-pg-webhook-secret-dev}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4351/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet

  simulator-onramp:
    build:
      context: ./services/onramp-simulator
      dockerfile: ../../infra/docker/Dockerfile.go
    container_name: stablenet-simulator-onramp
    restart: unless-stopped
    ports:
      - "${ONRAMP_SIMULATOR_PORT:-4352}:4352"
    environment:
      PORT: 4352
      # SECURITY: Set unique webhook secrets in production
      WEBHOOK_SECRET: ${ONRAMP_WEBHOOK_SECRET:-onramp-webhook-secret-dev}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4352/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet

  # ===================
  # Monitoring (Optional - activate with: docker compose --profile monitoring up)
  # ===================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: stablenet-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.2
    container_name: stablenet-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?required - set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      <<: *healthcheck-defaults
    <<: *resource-limits-sm
    networks:
      - stablenet
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  # Internal network for data services (PostgreSQL, Redis)
  # Not accessible from outside Docker
  data-internal:
    name: stablenet-data-internal
    driver: bridge
    internal: true

  # Service communication network
  # Services expose ports to host via this network
  stablenet:
    name: stablenet-network
    driver: bridge
