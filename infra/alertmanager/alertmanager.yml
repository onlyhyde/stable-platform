# AlertManager configuration for StableNet services
# Reference: https://prometheus.io/docs/alerting/latest/configuration/

global:
  # Default SMTP settings (configure based on environment)
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@stablenet.local'
  smtp_require_tls: true

  # Slack (optional)
  # slack_api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'

  # Default timeout for resolving alerts
  resolve_timeout: 5m

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by alertname
  group_by: ['alertname', 'service']

  # Wait time before sending first notification
  group_wait: 30s

  # Wait time before sending updates
  group_interval: 5m

  # Wait time before resending notification
  repeat_interval: 4h

  # Child routes for specific alerts
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 4h

# Receivers
receivers:
  - name: 'default-receiver'
    # Configure email, slack, or other notification channels
    # email_configs:
    #   - to: 'ops-team@stablenet.local'
    webhook_configs:
      - url: 'http://localhost:9093/webhook'
        send_resolved: true

  - name: 'critical-receiver'
    # email_configs:
    #   - to: 'critical-alerts@stablenet.local'
    webhook_configs:
      - url: 'http://localhost:9093/webhook/critical'
        send_resolved: true

  - name: 'warning-receiver'
    # email_configs:
    #   - to: 'ops-team@stablenet.local'
    webhook_configs:
      - url: 'http://localhost:9093/webhook/warning'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  # If critical alert is firing, suppress warning alerts for the same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service']
