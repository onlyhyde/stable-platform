name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: only read access by default
permissions:
  contents: read
  actions: read

jobs:
  # ===================
  # TypeScript Projects
  # ===================
  typescript:
    name: TypeScript CI
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload wallet extension build
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wallet-extension-${{ github.sha }}
          path: apps/wallet-extension/dist/
          retention-days: 7

  # ===================
  # Go Projects
  # ===================
  golang:
    name: Go CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - services/order-router
          - services/subscription-executor
          - services/bridge-relayer
          - services/bank-simulator
          - services/pg-simulator
          - services/onramp-simulator
          - packages/sdk-go

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build -v ./...

      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test -v ./...

      - name: Vulnerability check
        working-directory: ${{ matrix.service }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  # ===================
  # Rust Projects
  # ===================
  rust:
    name: Rust CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/stealth-server/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/stealth-server/Cargo.lock', 'services/stealth-server/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: services/stealth-server
        run: cargo build --release

      - name: Test
        working-directory: services/stealth-server
        run: cargo test --all

      - name: Audit dependencies
        working-directory: services/stealth-server
        run: |
          cargo install cargo-audit --quiet
          cargo audit
        continue-on-error: true

  # ===================
  # E2E Tests
  # ===================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download wallet extension build
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: wallet-extension-${{ github.sha }}
          path: apps/wallet-extension/dist/

      - name: Install Playwright browsers
        working-directory: apps/wallet-extension
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/wallet-extension
        run: npx playwright test
        env:
          CI: true

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: e2e-report-${{ github.sha }}
          path: apps/wallet-extension/e2e-report/
          retention-days: 7

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: e2e-results-${{ github.sha }}
          path: apps/wallet-extension/e2e-results/
          retention-days: 7

  # ===================
  # Docker Build Test
  # ===================
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [typescript, golang, rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker images
        run: |
          docker compose build --parallel

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

  # ===================
  # Biome Format Check
  # ===================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check
