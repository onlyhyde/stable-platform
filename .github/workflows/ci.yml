name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: only read access by default
permissions:
  contents: read
  actions: read

jobs:
  # ===================
  # TypeScript Projects
  # ===================
  typescript:
    name: TypeScript CI
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:ci

      - name: Upload wallet extension build
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wallet-extension-${{ github.sha }}
          path: apps/wallet-extension/dist/
          retention-days: 7

  # ===================
  # Go Projects
  # ===================
  golang:
    name: Go CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - services/order-router
          - services/subscription-executor
          - services/bridge-relayer
          - services/bank-simulator
          - services/pg-simulator
          - services/onramp-simulator
          - packages/sdk-go

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build -v ./...

      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test -v ./...

      - name: Vulnerability check
        working-directory: ${{ matrix.service }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  # ===================
  # Rust Projects
  # ===================
  rust:
    name: Rust CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/stealth-server/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/stealth-server/Cargo.lock', 'services/stealth-server/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: services/stealth-server
        run: cargo build --release

      - name: Test
        working-directory: services/stealth-server
        run: cargo test --all

      - name: Audit dependencies
        working-directory: services/stealth-server
        run: |
          cargo install cargo-audit --quiet
          cargo audit
        continue-on-error: true

  # ===================
  # E2E Tests (temporarily disabled)
  # ===================
  # SKIPPED: Playwright's bundled Chromium on CI does not support MV3 service
  # worker registration, causing all Chrome extension E2E tests to fail with
  # "serviceworker timeout" and "ERR_FILE_NOT_FOUND" errors.
  # TODO: Re-enable once CI has a Chrome build that supports MV3 extensions.
  # Run locally with: cd apps/wallet-extension && npx playwright test
  # e2e:
  #   name: E2E Tests
  #   runs-on: ubuntu-latest
  #   needs: [typescript]
  #   ...

  # ===================
  # Biome Format Check
  # ===================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check
