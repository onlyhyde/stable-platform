name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ===================
  # TypeScript Projects
  # ===================
  typescript:
    name: TypeScript CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload wallet extension build
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: wallet-extension-${{ github.sha }}
          path: apps/wallet-extension/dist/
          retention-days: 7

  # ===================
  # Go Projects
  # ===================
  golang:
    name: Go CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - services/order-router
          - services/subscription-executor
          - services/bridge-relayer
          - services/bank-simulator
          - services/pg-simulator
          - services/onramp-simulator
          - packages/sdk-go

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build -v ./...

      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test -v ./...

  # ===================
  # Rust Projects
  # ===================
  rust:
    name: Rust CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            services/stealth-server/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/stealth-server/Cargo.lock', 'services/stealth-server/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: services/stealth-server
        run: cargo build --release

      - name: Test
        working-directory: services/stealth-server
        run: cargo test --all

  # ===================
  # E2E Tests
  # ===================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download wallet extension build
        uses: actions/download-artifact@v8
        with:
          name: wallet-extension-${{ github.sha }}
          path: apps/wallet-extension/dist/

      - name: Install Playwright browsers
        working-directory: apps/wallet-extension
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/wallet-extension
        run: npx playwright test
        env:
          CI: true

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-report-${{ github.sha }}
          path: apps/wallet-extension/e2e-report/
          retention-days: 7

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-results-${{ github.sha }}
          path: apps/wallet-extension/e2e-results/
          retention-days: 7

  # ===================
  # Docker Build Test
  # ===================
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [typescript, golang, rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose build --parallel

  # ===================
  # Biome Format Check
  # ===================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check
