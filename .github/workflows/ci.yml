name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ===================
  # TypeScript Projects
  # ===================
  typescript:
    name: TypeScript CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # ===================
  # Go Projects
  # ===================
  golang:
    name: Go CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - services/stealth-server
          - services/order-router
          - services/subscription-executor
          - services/bridge-relayer
          - simulators/bank
          - simulators/pg
          - simulators/onramp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build -v ./...

      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test -v ./...

  # ===================
  # Docker Build Test
  # ===================
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [typescript, golang]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose build --parallel

  # ===================
  # Biome Format Check
  # ===================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check
