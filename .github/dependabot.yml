version: 2
updates:
  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      viem:
        patterns:
          - "viem"
          - "wagmi"
      build-tools:
        patterns:
          - "tsup"
          - "turbo"
          - "@biomejs/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"

  # Go dependencies
  - package-ecosystem: "gomod"
    directory: "/services/stealth-server"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/services/order-router"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/services/subscription-executor"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/services/bridge-relayer"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/simulators/bank"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/simulators/pg"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/simulators/onramp"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
