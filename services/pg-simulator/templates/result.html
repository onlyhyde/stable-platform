<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Result - PG Simulator</title>
    {{if .redirectURL}}<meta http-equiv="refresh" content="5;url={{.redirectURL}}">{{end}}
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .result-container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 480px; width: 100%; padding: 40px; text-align: center; }
        .status-icon { font-size: 64px; margin-bottom: 16px; }
        .status-icon.success::before { content: '\2705'; }
        .status-icon.error::before { content: '\274C'; }
        .status-icon.cancelled::before { content: '\1F6AB'; }
        .status-icon.refunded::before { content: '\21A9\FE0F'; }
        .status-icon.pending::before { content: '\23F3'; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        h1.success { color: #4CAF50; }
        h1.error { color: #f44336; }
        h1.cancelled { color: #ff9800; }
        h1.refunded { color: #2196F3; }
        h1.pending { color: #9e9e9e; }
        .details { margin-top: 24px; text-align: left; background: #f8f9fa; border-radius: 8px; padding: 16px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #666; font-size: 14px; }
        .detail-value { color: #333; font-weight: 600; font-size: 14px; }
        .redirect-notice { margin-top: 24px; padding: 12px; background: #e7f3ff; border-radius: 8px; font-size: 13px; color: #1565C0; }
        .redirect-link { display: inline-block; margin-top: 16px; color: #4CAF50; text-decoration: none; font-weight: 600; }
        .redirect-link:hover { text-decoration: underline; }
        .countdown { font-weight: bold; }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="status-icon {{.statusClass}}"></div>
        <h1 class="{{.statusClass}}">{{.statusText}}</h1>

        <div class="details">
            <div class="detail-row">
                <span class="detail-label">Payment ID</span>
                <span class="detail-value">{{.paymentID}}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Order ID</span>
                <span class="detail-value">{{.orderID}}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount</span>
                <span class="detail-value">{{.currency}} {{.amount}}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value">{{.status}}</span>
            </div>
        </div>

        {{if .redirectURL}}
        <div class="redirect-notice">
            Redirecting to merchant in <span class="countdown" id="countdown">5</span> seconds...
        </div>
        <a href="{{.redirectURL}}" class="redirect-link">Click here if not redirected automatically</a>
        {{end}}
    </div>

    {{if .redirectURL}}
    <script>
        var seconds = 5;
        var countdownEl = document.getElementById('countdown');
        var timer = setInterval(function() {
            seconds--;
            if (countdownEl) countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '{{.redirectURL}}';
            }
        }, 1000);
    </script>
    {{end}}
</body>
</html>
