version: '3.8'

services:
  # =============================================================================
  # Infrastructure Services
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: stablenet-postgres
    environment:
      POSTGRES_USER: stablenet
      POSTGRES_PASSWORD: stablenet-dev-password
      POSTGRES_DB: stablenet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablenet -d stablenet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stablenet

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: stablenet-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stablenet

  # =============================================================================
  # Simulator Services (Fiat Infrastructure Simulation)
  # =============================================================================

  bank-simulator:
    build:
      context: ./services/bank-simulator
      dockerfile: Dockerfile
    container_name: stablenet-bank-simulator
    environment:
      PORT: "4350"
      WEBHOOK_URL: ""
      WEBHOOK_SECRET: bank-webhook-secret-dev
      DEFAULT_BALANCE: "10000.00"
      LOG_LEVEL: info
      LOG_FORMAT: json
      GIN_MODE: debug
    ports:
      - "4350:4350"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4350/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stablenet

  pg-simulator:
    build:
      context: ./services/pg-simulator
      dockerfile: Dockerfile
    container_name: stablenet-pg-simulator
    environment:
      PORT: "4351"
      BASE_URL: http://pg-simulator:4351
      WEBHOOK_URL: ""
      WEBHOOK_SECRET: pg-webhook-secret-dev
      SUCCESS_RATE: "95"
      BANK_SIMULATOR_URL: http://bank-simulator:4350
      LOG_LEVEL: info
      LOG_FORMAT: json
      GIN_MODE: debug
    ports:
      - "4351:4351"
    depends_on:
      bank-simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4351/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stablenet

  onramp-simulator:
    build:
      context: ./services/onramp-simulator
      dockerfile: Dockerfile
    container_name: stablenet-onramp-simulator
    environment:
      PORT: "4352"
      BASE_URL: http://onramp-simulator:4352
      WEBHOOK_URL: ""
      WEBHOOK_SECRET: onramp-webhook-secret-dev
      PG_SIMULATOR_URL: http://pg-simulator:4351
      BANK_SIMULATOR_URL: http://bank-simulator:4350
      PROCESSING_TIME: "5"
      SUCCESS_RATE: "95"
      KYC_PROCESSING_TIME: "5"
      KYC_SUCCESS_RATE: "90"
      TRANSFER_PROCESSING_TIME: "3"
      TRANSFER_SUCCESS_RATE: "95"
      REFUND_PROCESSING_TIME: "5"
      USD_TO_USDC: "0.998"
      LOG_LEVEL: info
      LOG_FORMAT: json
      GIN_MODE: debug
    ports:
      - "4352:4352"
    depends_on:
      pg-simulator:
        condition: service_healthy
      bank-simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4352/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stablenet

  # =============================================================================
  # Core Services (Blockchain Infrastructure)
  # =============================================================================

  subscription-executor:
    build:
      context: ./services/subscription-executor
      dockerfile: Dockerfile
    container_name: stablenet-subscription-executor
    environment:
      PORT: "8083"
      RPC_URL: http://anvil:8545
      CHAIN_ID: "31337"
      SUBSCRIPTION_MANAGER_ADDRESS: ${SUBSCRIPTION_MANAGER_ADDRESS:-}
      RECURRING_PAYMENT_EXECUTOR_ADDRESS: ${RECURRING_PAYMENT_EXECUTOR_ADDRESS:-}
      ENTRYPOINT_ADDRESS: "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
      BUNDLER_URL: http://bundler:4337
      PAYMASTER_URL: http://paymaster:3001
      EXECUTOR_PRIVATE_KEY: ${EXECUTOR_PRIVATE_KEY:-}
      DATABASE_URL: postgres://stablenet:stablenet-dev-password@postgres:5432/stablenet?sslmode=disable
      DATABASE_MAX_CONNS: "10"
      DATABASE_MIN_CONNS: "2"
      DATABASE_USE_INMEMORY: "false"
      POLLING_INTERVAL: "60"
      LOG_LEVEL: info
      LOG_FORMAT: json
      GIN_MODE: debug
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stablenet

  order-router:
    build:
      context: ./services/order-router
      dockerfile: Dockerfile
    container_name: stablenet-order-router
    environment:
      PORT: "8087"
      RPC_URL: http://anvil:8545
      CHAIN_ID: "31337"
      ONEINCH_API_KEY: ${ONEINCH_API_KEY:-}
      ZEROX_API_KEY: ${ZEROX_API_KEY:-}
      UNISWAP_V2_ROUTER: "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"
      UNISWAP_V3_ROUTER: "0xE592427A0AEce92De3Edee1F18E0157C05861564"
      UNISWAP_V3_QUOTER: "0xb27308f9F90D607463bb33eA1BeBb41C27CE5AB6"
      SUSHISWAP_ROUTER: "0xd9e1cE17f2641f24aE83637ab66a2cca9C378B9F"
      CURVE_REGISTRY: "0x90E00ACe148ca3b23Ac1bC8C240C2a7Dd9c2d7f5"
      PRICE_CACHE_TTL: "30"
      MAX_HOPS: "3"
      MAX_SPLITS: "5"
      DEFAULT_SLIPPAGE: "50"
      LOG_LEVEL: info
      LOG_FORMAT: json
      GIN_MODE: debug
    ports:
      - "8087:8087"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stablenet

  bridge-relayer:
    build:
      context: ./services/bridge-relayer
      dockerfile: Dockerfile
    container_name: stablenet-bridge-relayer
    environment:
      PORT: "8080"
      SOURCE_RPC_URL: http://anvil:8545
      TARGET_RPC_URL: http://anvil:8545
      SOURCE_CHAIN_ID: "31337"
      TARGET_CHAIN_ID: "31338"
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY:-}
      GAS_LIMIT_BUFFER: "50000"
      MAX_GAS_PRICE_GWEI: "500"
      CONFIRM_BLOCKS: "12"
      MPC_SIGNER_ENDPOINTS: ""
      MPC_THRESHOLD: "5"
      MPC_TOTAL_SIGNERS: "7"
      MPC_TIMEOUT: "30s"
      CONTRACT_SECURE_BRIDGE: ${CONTRACT_SECURE_BRIDGE:-}
      CONTRACT_BRIDGE_VALIDATOR: ${CONTRACT_BRIDGE_VALIDATOR:-}
      CONTRACT_BRIDGE_RATE_LIMITER: ${CONTRACT_BRIDGE_RATE_LIMITER:-}
      CONTRACT_OPTIMISTIC_VERIFIER: ${CONTRACT_OPTIMISTIC_VERIFIER:-}
      CONTRACT_FRAUD_PROOF_VERIFIER: ${CONTRACT_FRAUD_PROOF_VERIFIER:-}
      CONTRACT_BRIDGE_GUARDIAN: ${CONTRACT_BRIDGE_GUARDIAN:-}
      MONITOR_POLL_INTERVAL: "5s"
      MONITOR_BLOCK_CONFIRMATIONS: "12"
      MONITOR_MAX_BLOCK_RANGE: "1000"
      MONITOR_RETRY_ATTEMPTS: "3"
      MONITOR_RETRY_DELAY: "5s"
      RATE_LIMIT_RPS: "10"
      RATE_LIMIT_BURST: "20"
      SERVER_READ_TIMEOUT: "30s"
      SERVER_WRITE_TIMEOUT: "30s"
      LOG_LEVEL: info
      LOG_FORMAT: json
      GIN_MODE: debug
    ports:
      - "8080:8080"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stablenet

  # =============================================================================
  # Monitoring (Optional)
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: stablenet-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - stablenet
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.2
    container_name: stablenet-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - stablenet
    profiles:
      - monitoring

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  stablenet:
    driver: bridge
